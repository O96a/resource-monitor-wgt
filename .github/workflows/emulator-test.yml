name: Emulator Crash Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Inject google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ Injected real google-services.json"
          fi

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Run on emulator and capture logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Wait for emulator to fully boot
            adb wait-for-device
            adb shell input keyevent 82

            # Clear logcat
            adb logcat -c

            # Install the APK
            adb install android/app/build/outputs/apk/debug/app-debug.apk

            # Launch the app
            echo "=== Launching app ==="
            adb shell am start -n com.aamer.resourcemonitor/.ui.MainActivity

            # Wait for app to start (or crash)
            sleep 15

            # Check if app is still running
            echo "=== Process check ==="
            adb shell pidof com.aamer.resourcemonitor || echo "APP IS NOT RUNNING (crashed)"

            # Dump full logcat filtered by our app + crashes
            echo "=== Saving logcat ==="
            adb logcat -d > /tmp/full-logcat.txt

            # Extract crash-relevant lines
            adb logcat -d | grep -iE "AndroidRuntime|FATAL|ResourceMonitor|aamer|crash|exception|Error|firebase|WorkManager|Glance|DataStore|ComponentActivity" | head -200 > /tmp/crash-logcat.txt

            # Also get tombstones if any
            adb logcat -d -s AndroidRuntime:E > /tmp/crash-only.txt

            echo "=== Crash log (filtered) ==="
            cat /tmp/crash-logcat.txt

            echo ""
            echo "=== Fatal exceptions ==="
            cat /tmp/crash-only.txt

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-logcat
          path: |
            /tmp/full-logcat.txt
            /tmp/crash-logcat.txt
            /tmp/crash-only.txt
          retention-days: 7
